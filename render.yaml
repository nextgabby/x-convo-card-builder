services:
  - type: web
    name: cardforge
    env: node
    buildCommand: npm install --include=dev && cd client && npm install --include=dev && npm run build && cd ../server && npm install
    startCommand: node server/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: DATABASE_PATH
        value: /var/data/cardforge.db
      - key: X_CLIENT_ID
        sync: false
      - key: X_CLIENT_SECRET
        sync: false
      - key: X_REDIRECT_URI
        sync: false
      - key: CLIENT_URL
        sync: false
    disk:
      name: data
      mountPath: /var/data
      sizeGB: 1
